<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean's Eagle Mountain Forecast</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 15px; color: #2c3e50; }
        .container { display: grid; grid-template-columns: 1.3fr 2fr 1.3fr; gap: 15px; max-width: 1300px; margin: 0 auto; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: white; border-radius: 15px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #d1d9e6; margin-bottom: 15px; }
        h3 { margin-top: 0; color: #007aff; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; font-size: 1.05em; text-transform: uppercase; letter-spacing: 0.5px; }
        .level { font-size: 3.2em; font-weight: 800; margin: 5px 0; color: #1a202c; }
        
        /* 24-Hour Wind List */
        .hourly-wind { font-size: 0.85em; margin-top: 10px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .wind-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
        .wind-row:last-child { border: none; }

        .fish-box { background: #f8fafc; border-radius: 10px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #3182ce; font-size: 0.85em; }
        .bait-tag { display: inline-block; background: #ebf8ff; color: #2b6cb0; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin: 2px; border: 1px solid #bee3f8; font-weight: bold; }
        
        .status-pill { font-size: 0.65em; font-weight: bold; padding: 4px; border-radius: 4px; display: block; text-transform: uppercase; text-align: center; }
        .go { background: #e6fffa; color: #2c7a7b; }
        .stop { background: #fff5f5; color: #c53030; }

        .yt-btn { display: block; text-align: center; background: #ff0000; color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 0.85em; }
        .updated { font-size: 0.7em; opacity: 0.5; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #1a202c; margin-bottom: 5px;">Dean's Eagle Mountain Forecast</h1>
    <div id="update-time" class="updated">Syncing Lake Sensors...</div>

    <div class="container">
        
        <div class="column">
            <div class="card">
                <h3 id="season-title">🎣 Seasonal Fishing</h3>
                <div id="fishing-report"></div>
                <a href="https://www.youtube.com/watch?v=ziHcb0oMf9g" target="_blank" class="yt-btn">📺 Watch Lake Patterns</a>
            </div>
        </div>

        <div class="column">
            <div class="card" style="text-align: center;">
                <div id="lake-level" class="level">...</div>
                <div id="lake-status" class="status-pill" style="display:inline-block; padding: 8px 25px;">Checking...</div>
            </div>

            <div class="card">
                <h3>🚤 Boating Outlook (AM/PM/Night)</h3>
                <div id="forecast-container"></div>
            </div>

            <div class="card">
                <canvas id="depthChart"></canvas>
            </div>
        </div>

        <div class="column">
            <div class="card" style="text-align: center;">
                <h3>💨 Current Wind</h3>
                <div id="wind-speed" style="font-size: 1.8em; font-weight: 800; color: #1a202c;">-- mph</div>
                <div id="wind-dir" style="font-size: 0.85em; margin-bottom: 10px;">--</div>
                <div id="wind-status" class="status-pill">--</div>
                
                <h4 style="font-size: 0.75em; margin: 20px 0 5px 0; color: #007aff; text-align: left; border-bottom: 1px solid #eef2f7;">24-HOUR WIND EST.</h4>
                <div id="hourly-wind-list" class="hourly-wind"></div>
            </div>
            
            <div class="card" style="background: #2d3748; color: white; border: none;">
                <h3>Dad's Log</h3>
                <div style="font-size: 0.85em; line-height: 1.8;">
                    📍 Full Pool: 649.10 ft<br>
                    ⚠️ Mud Line: 644.50 ft<br>
                    ⚓ Safe Ramp: Twin Points
                </div>
            </div>
        </div>
    </div>

    <script>
        const DANGER_LEVEL = 644.5;
        const WIND_LIMIT = 12; // Dean's new limit

        async function getWeatherData() {
            try {
                const res = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast/hourly');
                const data = await res.json();
                const periods = data.properties.periods;

                // Current Wind
                const now = periods[0];
                const curWind = parseInt(now.windSpeed.match(/\d+/)) || 0;
                document.getElementById('wind-speed').innerText = now.windSpeed;
                document.getElementById('wind-dir').innerText = "From " + now.windDirection;
                
                const ws = document.getElementById('wind-status');
                if (curWind >= WIND_LIMIT) { ws.innerText = "STAY AT HOME"; ws.className = "status-pill stop"; }
                else { ws.innerText = "SAFE TO BOAT"; ws.className = "status-pill go"; }

                // 24 Hour Wind Forecast
                let html = "";
                for (let i = 1; i <= 24; i++) {
                    const p = periods[i];
                    const time = new Date(p.startTime).toLocaleTimeString([], { hour: 'numeric' });
                    const val = parseInt(p.windSpeed.match(/\d+/)) || 0;
                    const color = val >= WIND_LIMIT ? 'color: #e53e3e; font-weight: bold;' : '';
                    html += `<div class="wind-row"><span>${time}</span><span style="${color}">${p.windSpeed}</span></div>`;
                }
                document.getElementById('hourly-wind-list').innerHTML = html;

                // Update Timeline (Daily)
                const dayRes = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
                const dayData = await dayRes.json();
                let timelineHtml = "";
                [0, 2, 4].forEach(i => {
                    const p = dayData.properties.periods[i];
                    const wVal = parseInt(p.windSpeed.match(/\d+/)) || 0;
                    const s = wVal >= WIND_LIMIT ? "stop" : "go";
                    const t = wVal >= WIND_LIMIT ? "Stay Home" : "Go";
                    timelineHtml += `<div style="margin-bottom:10px; border-bottom:1px solid #f1f5f9; padding-bottom:5px;">
                        <b style="font-size:0.8em">${p.name}</b>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                            <span style="font-size:0.75em">${p.windSpeed}</span>
                            <span class="status-pill ${s}" style="width:70px;">${t}</span>
                        </div>
                    </div>`;
                });
                document.getElementById('forecast-container').innerHTML = timelineHtml;
            } catch (e) { }
        }

        function updateFishing() {
            const reports = [
                { n: "Largemouth Bass", p: "Moving shallow. Rocks & reeds.", b: ["Crankbaits", "Jigs"] },
                { n: "Crappie", p: "Spawning on dock pilings.", b: ["Minnows", "Pink Jigs"] },
                { n: "White Bass", p: "Running up the north river.", b: ["Spoons"] }
            ];
            document.getElementById('fishing-report').innerHTML = reports.map(f => `
                <div class="fish-box"><strong>${f.n}</strong><br>${f.p}<br>
                ${f.b.map(bt => `<span class="bait-tag">${bt}</span>`).join('')}</div>`).join('');
        }

        async function getLakeData() {
            const res = await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=08045000&parameterCd=62615`);
            const data = await res.json();
            const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
            document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
            document.getElementById('update-time').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            const ls = document.getElementById('lake-status');
            if (level > DANGER_LEVEL) { ls.innerText = "DOCK IS SAFE"; ls.className = "status-pill go"; }
            else { ls.innerText = "LAKE IS LOW"; ls.className = "status-pill stop"; }
        }

        updateFishing(); getLakeData(); getWeatherData();
    </script>
</body>
</html>
