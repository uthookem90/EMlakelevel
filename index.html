<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eagle Mountain Lake Monitor</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin: 10px auto; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .level { font-size: 2.5em; font-weight: bold; color: #005eb8; }
        .status { font-weight: bold; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .safe { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h2>Dad's Lake Dashboard</h2>

    <div class="card">
        <h3>Current Lake Level</h3>
        <div id="lake-level" class="level">Loading...</div>
        <p>Conservation Pool: 649.1 ft</p>
        <div id="status-box" class="status">Checking depth...</div>
    </div>

    <div class="card">
        <h3>2-Day Weather & Rain</h3>
        <div id="weather-info">Loading forecast...</div>
    </div>

    <script>
        // 1. SET THE DANGER THRESHOLD
        // Ask your dad at what level (ft) his boat starts to hit mud. 
        // Example: 644.0 is often considered "Low" for Eagle Mountain.
        const DANGER_LEVEL = 644.5; 

        async function getLakeData() {
            try {
                const response = await fetch('https://waterservices.usgs.gov/nwis/iv/?format=json&sites=08045000&parameterCd=00065');
                const data = await response.json();
                const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
                
                document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
                
                const statusBox = document.getElementById('status-box');
                if (level > DANGER_LEVEL + 1) {
                    statusBox.innerText = "✅ DEEP ENOUGH";
                    statusBox.className = "status safe";
                } else if (level > DANGER_LEVEL) {
                    statusBox.innerText = "⚠️ GETTING LOW - WATCH OUT";
                    statusBox.className = "status warning";
                } else {
                    statusBox.innerText = "🚨 TOO LOW FOR DOCK";
                    statusBox.className = "status danger";
                }
            } catch (e) { document.getElementById('lake-level').innerText = "Error loading data"; }
        }

        async function getWeatherData() {
            try {
                // NWS Forecast for Eagle Mountain area (Grid FWD/73,95)
                const response = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
                const data = await response.json();
                const periods = data.properties.periods.slice(0, 3); // Get today and tomorrow
                
                let html = "";
                periods.forEach(p => {
                    html += `<p><strong>${p.name}:</strong> ${p.temperature}°F - ${p.shortForecast}<br>
                             <small>${p.detailedForecast}</small></p><hr>`;
                });
                document.getElementById('weather-info').innerHTML = html;
            } catch (e) { document.getElementById('weather-info').innerText = "Error loading weather"; }
        }

        getLakeData();
        getWeatherData();
    </script>
</body>
</html>
