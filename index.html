<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad's Eagle Mountain Dashboard</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; text-align: center; background: #f4f7f9; padding: 20px; color: #333; }
        .card { background: white; border-radius: 20px; padding: 25px; margin: 15px auto; max-width: 450px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .level { font-size: 3.5em; font-weight: 800; color: #007aff; margin: 5px 0; }
        .status { font-weight: bold; padding: 15px; border-radius: 12px; margin-top: 15px; text-transform: uppercase; }
        .safe { background: #dcfce7; color: #166534; }
        .warning { background: #fef9c3; color: #854d0e; }
        .danger { background: #fee2e2; color: #991b1b; }
        .timestamp { font-size: 0.75em; opacity: 0.5; margin-top: 10px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .weather-row { text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 0;">Eagle Mountain Lake</h2>
    <p style="margin-top: 5px; opacity: 0.6;">Dad's Dock Monitor</p>

    <div class="card">
        <div style="font-size: 0.9em; font-weight: 600; opacity: 0.7;">Current Water Elevation</div>
        <div id="lake-level" class="level">...</div>
        <div id="status-box" class="status">Connecting...</div>
        <div id="update-time" class="timestamp"></div>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">Rain & Wind Outlook</h3>
        <div id="weather-info" class="weather-row">Loading Fort Worth forecast...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Adjust this to the level where the boat hits mud at his dock!
        const DANGER_LEVEL = 644.5; 
        const FULL_POOL = 649.1;

        async function getLakeData() {
            try {
                // Primary Source: USGS Gauge 08045000 (Eagle Mountain Lake)
                // Parameter 62615 is Elevation (NAVD88)
                const url = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=08045000&parameterCd=62615';
                const response = await fetch(url);
                const data = await response.json();
                
                // Digging into the USGS JSON structure
                const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
                const time = new Date(data.value.timeSeries[0].values[0].value[0].dateTime).toLocaleString();
                
                updateUI(level, time);
            } catch (e) {
                console.error("USGS Fetch failed, trying fallback...", e);
                getFallbackData();
            }
        }

        async function getFallbackData() {
            try {
                // Secondary Source: Water Data For Texas (TWDB)
                const url = 'https://waterdatafortexas.org/reservoirs/individual/eagle-mountain.json';
                const response = await fetch(url);
                const data = await response.json();
                const level = data.most_recent_observation.elevation;
                const time = data.most_recent_observation.date;
                updateUI(level, "Source: TWDB | " + time);
            } catch (e) {
                document.getElementById('lake-level').innerText = "OFFLINE";
                document.getElementById('status-box').innerText = "Data Temporarily Unavailable";
            }
        }

        function updateUI(level, time) {
            document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
            document.getElementById('update-time').innerText = "Last Updated: " + time;
            
            const statusBox = document.getElementById('status-box');
            const diffFromFull = (FULL_POOL - level).toFixed(1);

            if (level > DANGER_LEVEL + 0.8) {
                statusBox.innerText = `✅ Dock OK (${diffFromFull}ft below full)`;
                statusBox.className = "status safe";
            } else if (level > DANGER_LEVEL) {
                statusBox.innerText = `⚠️ Caution: Water is Low`;
                statusBox.className = "status warning";
            } else {
                statusBox.innerText = `🚨 Too Low: Move Boats!`;
                statusBox.className = "status danger";
            }
        }

        async function getWeatherData() {
            try {
                const response = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
                const data = await response.json();
                const periods = data.properties.periods.slice(0, 3);
                
                let html = "";
                periods.forEach(p => {
                    html += `<div><strong>${p.name}:</strong> ${p.temperature}°F - ${p.shortForecast}<br>
                             <small style="color: #666;">${p.detailedForecast}</small></div><hr>`;
                });
                document.getElementById('weather-info').innerHTML = html;
            } catch (e) { 
                document.getElementById('weather-info').innerText = "Weather unavailable. Check NWS app.";
            }
        }

        getLakeData();
        getWeatherData();
    </script>
</body>
</html>
