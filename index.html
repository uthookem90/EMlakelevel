<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Mountain - Dad's Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f0f4f8; padding: 20px; color: #2c3e50; }
        .card { background: white; border-radius: 20px; padding: 20px; margin: 12px auto; max-width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #d1d9e6; }
        .level { font-size: 3em; font-weight: 800; color: #007aff; margin: 5px 0; }
        .status { font-weight: bold; padding: 12px; border-radius: 10px; margin-top: 10px; text-transform: uppercase; font-size: 0.85em; }
        .safe { background: #e6fffa; color: #2c7a7b; border: 1px solid #81e6d9; }
        .warning { background: #fffaf0; color: #9c4221; border: 1px solid #fbd38d; }
        .danger { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .destination-title { font-weight: bold; color: #2d3748; margin-top: 10px; display: block; }
        .destination-box { background: #edf2f7; border-radius: 10px; padding: 15px; margin-top: 10px; font-size: 0.9em; text-align: left; }
        .timestamp { font-size: 0.7em; opacity: 0.5; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #edf2f7; margin: 12px 0; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 2px;">Eagle Mountain Lake</h2>
    <div id="update-time" class="timestamp">Syncing...</div>

    <div class="card">
        <div id="boating-icon" style="font-size: 3em;">🚤</div>
        <div id="boating-text" style="font-weight: bold; font-size: 1.2em; margin-top: 5px;">Analyzing Conditions...</div>
        <div id="boating-status" class="status">Loading weather...</div>
    </div>

    <div class="card">
        <div style="font-size: 0.75em; font-weight: bold; opacity: 0.6; letter-spacing: 1px;">SURFACE ELEVATION</div>
        <div id="lake-level" class="level">...</div>
        <div id="lake-status" class="status">Connecting...</div>
    </div>

    <div class="card">
        <span class="destination-title">📍 Recommended Spot Today</span>
        <div id="destination-guide" class="destination-box">
            Determining best location based on wind fetch...
        </div>
    </div>

    <script>
        const DANGER_LEVEL = 644.5; 

        async function init() {
            await getLakeData();
            await getWeatherData();
        }

        async function getLakeData() {
            try {
                const url = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=08045000&parameterCd=62615';
                const response = await fetch(url);
                const data = await response.json();
                const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
                const time = new Date(data.value.timeSeries[0].values[0].value[0].dateTime).toLocaleString([], {hour: '2-digit', minute:'2-digit'});

                document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
                document.getElementById('update-time').innerText = "Last Updated: " + time;

                const lStatus = document.getElementById('lake-status');
                if (level > DANGER_LEVEL + 0.8) {
                    lStatus.innerText = "✅ Depth is Safe"; lStatus.className = "status safe";
                } else if (level > DANGER_LEVEL) {
                    lStatus.innerText = "⚠️ Water is Low"; lStatus.className = "status warning";
                } else {
                    lStatus.innerText = "🚨 TOO SHALLOW"; lStatus.className = "status danger";
                }
            } catch (e) { document.getElementById('lake-level').innerText = "OFFLINE"; }
        }

        async function getWeatherData() {
            try {
                const response = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
                const data = await response.json();
                const today = data.properties.periods[0];
                
                const windDir = today.windDirection;
                const windNum = parseInt(today.windSpeed.match(/\d+/)) || 0;
                const isWest = ["W", "SW", "NW"].includes(windDir);
                const isRainy = today.shortForecast.toLowerCase().includes("rain") || today.shortForecast.toLowerCase().includes("storm");
                
                const bIcon = document.getElementById('boating-icon');
                const bText = document.getElementById('boating-text');
                const bStatus = document.getElementById('boating-status');
                const dGuide = document.getElementById('destination-guide');

                // 1. SET STATUS
                if (isRainy || windNum > 20) {
                    bIcon.innerText = "🏠"; bText.innerText = "Stay at the House";
                    bStatus.innerText = isRainy ? "Storms Forecasted" : "Danger: High Winds";
                    bStatus.className = "status danger";
                } else if (isWest && windNum >= 10) {
                    bIcon.innerText = "🌊"; bText.innerText = "Rough on East Shore";
                    bStatus.innerText = `West Wind ${today.windSpeed}`;
                    bStatus.className = "status warning";
                } else {
                    bIcon.innerText = "🚤"; bText.innerText = "Good for Boating";
                    bStatus.innerText = "Conditions look clear";
                    bStatus.className = "status safe";
                }

                // 2. SET DESTINATION GUIDE
                if (isWest) {
                    dGuide.innerHTML = "<b>West Bay / Twin Points:</b> Head across the lake to the west side. The hills will block the wind and keep the water calm for the jet skis.";
                } else if (windDir === "S" || windDir === "SE") {
                    dGuide.innerHTML = "<b>Upper Lake / Coves:</b> South winds make the main body choppy. Head north toward the quieter coves or the 'Party Cove' area for smoother water.";
                } else if (windDir === "N" || windDir === "NE") {
                    dGuide.innerHTML = "<b>Dam Area / South End:</b> North winds blow straight down the lake. The southern end near the dam or the southern-facing coves will be most protected.";
                } else {
                    dGuide.innerHTML = "<b>East Shore (Your Dock):</b> With light or East winds, your side of the lake is perfect today. Enjoy the calm water!";
                }

            } catch (e) { document.getElementById('boating-status').innerText = "Weather Sync Failed"; }
        }
        init();
    </script>
</body>
</html>
