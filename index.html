<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean's Eagle Mountain Forecast</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 15px; color: #2c3e50; }
        .container { display: grid; grid-template-columns: 1.3fr 2fr 1.3fr; gap: 15px; max-width: 1300px; margin: 0 auto; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: white; border-radius: 15px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #d1d9e6; margin-bottom: 15px; }
        h3 { margin-top: 0; color: #007aff; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; font-size: 1.05em; text-transform: uppercase; letter-spacing: 0.5px; }
        .level { font-size: 3.2em; font-weight: 800; margin: 5px 0; color: #1a202c; }
        
        /* 3-Day Timeline */
        .day-container { margin-bottom: 12px; border-bottom: 1px solid #edf2f7; padding-bottom: 10px; }
        .timeline { display: flex; justify-content: space-between; gap: 5px; margin-top: 8px; }
        .time-slot { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; background: #f8fafc; font-size: 0.75em; border: 1px solid #e2e8f0; }
        .wind-val { font-weight: bold; color: #4a5568; margin: 3px 0; font-size: 0.85em; }

        /* V5 Style Fishing Cards */
        .fish-box { background: #f8fafc; border-radius: 10px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #3182ce; font-size: 0.85em; text-align: left; }
        .bait-tag { display: inline-block; background: #ebf8ff; color: #2b6cb0; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin: 2px; border: 1px solid #bee3f8; font-weight: bold; }
        
        .status-pill { font-size: 0.6em; font-weight: bold; padding: 3px; border-radius: 4px; display: block; text-transform: uppercase; }
        .go { background: #e6fffa; color: #2c7a7b; }
        .caution { background: #fffaf0; color: #9c4221; }
        .stop { background: #fff5f5; color: #c53030; }

        .yt-btn { display: block; text-align: center; background: #ff0000; color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 0.85em; }
        .updated { font-size: 0.7em; opacity: 0.5; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #1a202c; margin-bottom: 5px;">Dean's Eagle Mountain Forecast</h1>
    <div id="update-time" class="updated">Syncing Lake Sensors...</div>

    <div class="container">
        
        <div class="column">
            <div class="card">
                <h3 id="season-title">🎣 Spring Fishing</h3>
                <div id="fishing-report"></div>
                <a href="https://www.youtube.com/watch?v=ziHcb0oMf9g" target="_blank" class="yt-btn">📺 Watch Lake Patterns</a>
            </div>
        </div>

        <div class="column">
            <div class="card" style="text-align: center;">
                <div id="lake-level" class="level">...</div>
                <div id="lake-status" class="status-pill" style="display:inline-block; padding: 5px 20px;">Checking...</div>
            </div>

            <div class="card">
                <h3>🚤 Timeline & Wind Forecast</h3>
                <div id="forecast-container"></div>
            </div>

            <div class="card">
                <canvas id="depthChart"></canvas>
            </div>
        </div>

        <div class="column">
            <div class="card" style="text-align: center;">
                <h3>💨 Current Wind</h3>
                <div id="wind-speed" style="font-size: 1.5em; font-weight: bold;">-- mph</div>
                <div id="wind-dir" style="font-size: 0.8em;">--</div>
            </div>
            
            <div class="card" style="background: #2d3748; color: white;">
                <h3>Dad's Log</h3>
                <p style="font-size: 0.8em;">Full Pool: 649.1'<br>Mud Line: 644.5'<br>Safe Ramp: Twin Points</p>
            </div>
        </div>
    </div>

    <script>
        const SITE_ID = '08045000';
        
        async function getWeatherData() {
            const res = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
            const data = await res.json();
            const container = document.getElementById('forecast-container');
            
            // Current Wind
            const now = data.properties.periods[0];
            document.getElementById('wind-speed').innerText = now.windSpeed;
            document.getElementById('wind-dir').innerText = "From " + now.windDirection;

            // 3-Day Timeline
            for (let i = 0; i < 3; i++) {
                const am = data.properties.periods[i*2];
                const pm = data.properties.periods[i*2+1];
                
                const getSlot = (p) => {
                    const w = p.windSpeed;
                    const val = parseInt(w.match(/\d+/)) || 0;
                    let s = "go", t = "Good";
                    if (val > 15) { s="stop"; t="Rough"; }
                    else if (val > 10) { s="caution"; t="Windy"; }
                    return `<div class="time-slot"><b>${p.name.includes("Night") ? "PM" : "AM"}</b><div class="wind-val">${w}</div><span class="status-pill ${s}">${t}</span></div>`;
                };

                container.innerHTML += `
                    <div class="day-container">
                        <div style="font-size:0.8em; font-weight:bold; color:#007aff;">${am.name.split(' ')[0]}</div>
                        <div class="timeline">${getSlot(am)}${getSlot(pm)}</div>
                    </div>`;
            }
        }

        // Restoring V5 Fishing Logic
        function updateFishing() {
            const reports = [
                { n: "Largemouth Bass", p: "Moving shallow to spawn.", b: ["Crankbaits", "Jigs"] },
                { n: "Crappie", p: "Spawning on dock pilings.", b: ["Minnows", "Pink Jigs"] },
                { n: "White Bass", p: "Running up the north river.", b: ["Spoons"] }
            ];
            document.getElementById('fishing-report').innerHTML = reports.map(f => `
                <div class="fish-box"><strong>${f.n}</strong><br>${f.p}<br>
                ${f.b.map(bt => `<span class="bait-tag">${bt}</span>`).join('')}</div>`).join('');
        }

        async function getLakeData() {
            const res = await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${SITE_ID}&parameterCd=62615`);
            const data = await res.json();
            const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
            document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
            document.getElementById('update-time').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            document.getElementById('lake-status').innerText = level > 644.5 ? "DOCK IS SAFE" : "LOW WATER";
            document.getElementById('lake-status').className = "status-pill " + (level > 644.5 ? "go" : "stop");
        }

        updateFishing(); getLakeData(); getWeatherData();
    </script>
</body>
</html>
