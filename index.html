<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean's Eagle Mountain Forecast</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; margin: 0; padding: 15px; color: #2c3e50; }
        .container { display: grid; grid-template-columns: 1.2fr 2fr 1.2fr; gap: 15px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #d1d9e6; margin-bottom: 15px; }
        h3 { margin-top: 0; color: #007aff; border-bottom: 2px solid #eef2f7; padding-bottom: 5px; font-size: 1.1em; }
        .level { font-size: 2.8em; font-weight: 800; margin: 10px 0; color: #1a202c; }
        
        /* Wind Compass */
        #compass { width: 80px; height: 80px; border: 4px solid #007aff; border-radius: 50%; margin: 10px auto; position: relative; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        #arrow { width: 4px; height: 40px; background: #e53e3e; position: absolute; left: 38px; bottom: 50%; transform-origin: bottom center; }
        
        /* Fishing Sidebar */
        .fish-box { background: #f8fafc; border-radius: 10px; padding: 10px; margin-bottom: 10px; border-left: 4px solid #3182ce; }
        .bait-tag { display: inline-block; background: #ebf8ff; color: #2b6cb0; font-size: 0.75em; padding: 2px 8px; border-radius: 4px; margin: 2px; border: 1px solid #bee3f8; }
        
        .status { font-weight: bold; padding: 8px; border-radius: 6px; text-transform: uppercase; font-size: 0.7em; }
        .go { background: #e6fffa; color: #2c7a7b; }
        .stop { background: #fff5f5; color: #c53030; }
        
        canvas { height: 180px !important; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #1a202c; margin-bottom: 20px;">Dean's Eagle Mountain Forecast</h1>

    <div class="container">
        
        <div class="column">
            <div class="card">
                <h3 id="season-title">🎣 Seasonal Report</h3>
                <div id="fishing-report">Loading local patterns...</div>
            </div>
        </div>

        <div class="column">
            <div class="card">
                <div style="font-size: 0.7em; font-weight: bold; opacity: 0.6;">CURRENT ELEVATION</div>
                <div id="lake-level" class="level">...</div>
                <div id="lake-status" class="status">Connecting...</div>
            </div>

            <div class="card">
                <div style="font-size: 0.8em; font-weight: bold;">30-DAY DEPTH TREND (Vs 2025)</div>
                <canvas id="depthChart"></canvas>
            </div>
        </div>

        <div class="column">
            <div class="card">
                <h3>💨 Live Wind</h3>
                <div id="compass"><div id="arrow"></div></div>
                <div style="font-size: 1.2em; font-weight: bold; margin-top: 10px;" id="wind-speed">-- mph</div>
                <div style="font-size: 0.8em; color: #718096;">From: <span id="wind-dir">--</span></div>
            </div>
            
            <div class="card" style="background: #2d3748; color: white;">
                <h3 style="color: #63b3ed; border-bottom-color: #4a5568;">Dad's Log</h3>
                <p style="font-size: 0.8em; line-height: 1.6;">
                    <b>Full Pool:</b> 649.1'<br>
                    <b>Mud Line:</b> 644.5'<br>
                    <b>Safe Ramp:</b> Twin Points
                </p>
            </div>
        </div>

    </div>

    <script>
        const DANGER_LEVEL = 644.5;
        const SITE_ID = '08045000';

        // --- FISHING DATABASE ---
        const seasonalFish = {
            spring: {
                title: "Spring Spawn (Mar-May)",
                report: [
                    { name: "Largemouth Bass", pattern: "Moving to shallow beds & reeds.", baits: ["Lipped Crankbaits", "Jigs", "Spinnerbaits"] },
                    { name: "White Bass", pattern: "Running up the river north.", baits: ["Small Spoons", "Rooster Tails"] },
                    { name: "Crappie", pattern: "Spawning around dock pilings.", baits: ["Minnows", "Pink/White Jigs"] }
                ]
            },
            summer: {
                title: "Summer Heat (Jun-Aug)",
                report: [
                    { name: "Largemouth Bass", pattern: "Deep structure & humps.", baits: ["Texas Rig Worms", "Deep Crankbaits"] },
                    { name: "Catfish", pattern: "Night fishing near the dam.", baits: ["Cut Shad", "Prepared Stink Bait"] },
                    { name: "White Bass", pattern: "Surfacing at dawn/dusk.", baits: ["Topwater Poppers"] }
                ]
            },
            fall: {
                title: "Fall Feed (Sep-Nov)",
                report: [
                    { name: "Largemouth Bass", pattern: "Following shad into coves.", baits: ["Lipless Cranks", "Buzzbaits"] },
                    { name: "Hybrid/White Bass", pattern: "Chasing schools in main lake.", baits: ["Slabs", "Silver Spoons"] }
                ]
            },
            winter: {
                title: "Winter Hold (Dec-Feb)",
                report: [
                    { name: "Blue Catfish", pattern: "Deep channels near river bed.", baits: ["Fresh Cut Bait"] },
                    { name: "Crappie", pattern: "Deep brush piles (20-30ft).", baits: ["Vertical Jigs"] }
                ]
            }
        };

        function updateFishing() {
            const month = new Date().getMonth(); // 0-11
            let season = "winter";
            if (month >= 2 && month <= 4) season = "spring";
            else if (month >= 5 && month <= 7) season = "summer";
            else if (month >= 8 && month <= 10) season = "fall";

            const data = seasonalFish[season];
            document.getElementById('season-title').innerText = "🎣 " + data.title;
            
            let html = "";
            data.report.forEach(f => {
                html += `<div class="fish-box">
                    <strong>${f.name}</strong><br>
                    <span style="font-size:0.8em; color:#4a5568;">${f.pattern}</span><br>
                    ${f.baits.map(b => `<span class="bait-tag">${b}</span>`).join('')}
                </div>`;
            });
            document.getElementById('fishing-report').innerHTML = html;
        }

        async function init() {
            updateFishing();
            await getLakeData();
            await getWeatherData();
            await renderChart();
        }

        async function getLakeData() {
            try {
                const url = `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${SITE_ID}&parameterCd=62615`;
                const response = await fetch(url);
                const data = await response.json();
                const level = parseFloat(data.value.timeSeries[0].values[0].value[0].value);
                document.getElementById('lake-level').innerText = level.toFixed(2) + ' ft';
                
                const lStatus = document.getElementById('lake-status');
                if (level > DANGER_LEVEL) { 
                    lStatus.innerText = "✅ DOCK IS SAFE"; lStatus.className = "status go"; 
                } else { 
                    lStatus.innerText = "🚨 WATER IS LOW"; lStatus.className = "status stop"; 
                }
            } catch (e) { document.getElementById('lake-level').innerText = "ERROR"; }
        }

        async function getWeatherData() {
            try {
                const response = await fetch('https://api.weather.gov/gridpoints/FWD/73,95/forecast');
                const data = await response.json();
                const today = data.properties.periods[0];
                
                const windDir = today.windDirection;
                document.getElementById('wind-speed').innerText = today.windSpeed;
                document.getElementById('wind-dir').innerText = windDir;
                
                const degrees = { 'N': 0, 'NE': 45, 'E': 90, 'SE': 135, 'S': 180, 'SW': 225, 'W': 270, 'NW': 315 };
                document.getElementById('arrow').style.transform = `rotate(${degrees[windDir] || 0}deg)`;
            } catch (e) { console.error(e); }
        }

        async function fetchHistory(s, e) {
            const url = `https://waterservices.usgs.gov/nwis/dv/?format=json&sites=${SITE_ID}&startDT=${s}&endDT=${e}&parameterCd=62615`;
            const response = await fetch(url);
            const data = await response.json();
            return data.value.timeSeries[0].values[0].value.map(v => parseFloat(v.value));
        }

        async function renderChart() {
            const ctx = document.getElementById('depthChart');
            const now = new Date();
            const lastYear = new Date(); lastYear.setFullYear(now.getFullYear() - 1);
            const fmt = d => d.toISOString().split('T')[0];
            
            const startNow = new Date(); startNow.setDate(now.getDate() - 30);
            const startLY = new Date(lastYear); startLY.setDate(lastYear.getDate() - 30);

            try {
                const dataNow = await fetchHistory(fmt(startNow), fmt(now));
                const dataLY = await fetchHistory(fmt(startLY), fmt(lastYear));
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array.from({length: 30}, (_, i) => 30-i),
                        datasets: [
                            { label: '2026', data: dataNow, borderColor: '#007aff', fill: false, tension: 0.3 },
                            { label: '2025', data: dataLY, borderColor: '#ccc', borderDash: [5,5], fill: false, tension: 0.3 }
                        ]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false } } }
                });
            } catch(e) {}
        }

        init();
    </script>
</body>
</html>
